<!doctype html>
<html lang="cs" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" href="./assets/brand/icon-32.png">
  <meta name="theme-color" content="#030815">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'">
  <title>Konzole školitele · AI Akademie GHRAB</title>
  <style>
    :root{color-scheme:dark;--bg:#030815;--panel:#08182a;--text:#eef8ff;--muted:#8da8bb;--cyan:#50e8ff;--purple:#a877ff;--gold:#f0aa4b;--green:#59e0a5;--red:#ff8f9a;--line:rgba(126,203,255,.2);font-family:Inter,ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif}
    *{box-sizing:border-box}body{margin:0;color:var(--text);background:radial-gradient(circle at 20% 0%,rgba(57,139,211,.2),transparent 34%),linear-gradient(180deg,#020714,#061321);line-height:1.45}.app{min-height:100vh;padding:18px}.top{position:sticky;top:0;z-index:4;margin:-18px -18px 16px;padding:15px 18px;border-bottom:1px solid var(--line);background:rgba(2,8,18,.94);backdrop-filter:blur(18px)}.topline{display:flex;justify-content:space-between;gap:12px;align-items:center}.eyebrow{margin:0;color:var(--cyan);font-size:.68rem;font-weight:950;letter-spacing:.14em}.screen-note{margin:9px 0 0;color:var(--muted);font-size:.72rem}.screen-note b{color:var(--gold)}.metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:14px 0}.metric{padding:11px;border:1px solid var(--line);border-radius:13px;background:rgba(255,255,255,.035)}.metric strong{display:block;font-size:1.08rem}.metric span{color:var(--muted);font-size:.64rem}.slide{padding:18px;border:1px solid var(--line);border-radius:18px;background:linear-gradient(145deg,rgba(8,27,46,.92),rgba(3,13,25,.88))}.slide small{color:var(--purple);font-weight:900;letter-spacing:.08em}.slide h1{margin:8px 0;font-size:clamp(1.7rem,5vw,2.7rem);line-height:1.02}.slide p{margin:0;color:#c8dce8}.guide{display:grid;gap:12px;margin-top:13px}.guide-note{margin:0;padding:12px 14px;border:1px solid rgba(80,232,255,.2);border-radius:13px;color:var(--muted);background:rgba(80,232,255,.04);font-size:.76rem}.guide-note strong{color:var(--cyan)}.flow{display:grid;gap:0}.step{position:relative;display:grid;grid-template-columns:38px minmax(0,1fr);gap:12px;padding-bottom:12px}.step:not(:last-child)::before{content:'';position:absolute;top:34px;bottom:-2px;left:18px;width:2px;background:linear-gradient(var(--line),rgba(80,232,255,.08))}.stepno{position:relative;z-index:1;width:36px;height:36px;display:grid;place-items:center;border:1px solid var(--line);border-radius:50%;color:#03111d;background:linear-gradient(135deg,var(--cyan),#9abaff);font-size:.76rem;font-weight:950}.stepbody{padding:14px 15px;border:1px solid var(--line);border-radius:15px;background:rgba(255,255,255,.035)}.stepbody>small{display:block;margin-bottom:3px;color:var(--muted);font-size:.61rem;font-weight:950;letter-spacing:.1em}.stepbody>strong{display:block;margin-bottom:8px}.stepbody ul{display:grid;gap:7px;margin:0;padding-left:19px}.stepbody li,.stepbody p{color:#d4e5ef;font-size:.82rem}.step.say .stepbody{border-color:rgba(80,232,255,.28);background:rgba(80,232,255,.06)}.step.say .stepbody>strong{color:var(--cyan)}.speech{display:grid;gap:8px}.speech p{margin:0;padding-left:13px;border-left:2px solid rgba(80,232,255,.42);color:#effcff;font-size:.9rem;font-weight:680}.step.explain .stepbody>strong{color:#d4c2ff}.step.demo .stepbody>strong{color:#a7ffd6}.step.ask .stepbody>strong{color:#ffd18d}.step.transition .stepbody>strong{color:#b9d1ff}.expected{margin-top:10px;padding-top:9px;border-top:1px solid var(--line)}.expected>small{display:block;margin-bottom:5px;color:var(--gold);font-weight:900}.support-title{margin:3px 0 0;color:var(--muted);font-size:.68rem;font-weight:950;letter-spacing:.1em}.support{display:grid;gap:9px}.card{padding:13px 14px;border:1px solid var(--line);border-left:4px solid;border-radius:0 13px 13px 0;background:rgba(255,255,255,.03)}.card strong{display:block;margin-bottom:7px}.card ul{display:grid;gap:6px;margin:0;padding-left:18px}.card li,.card p{color:#d4e5ef;font-size:.78rem}.card.method{border-left-color:var(--green)}.card.method strong{color:#a7ffd6}.card.caution{border-left-color:var(--red)}.card.caution strong{color:#ffbbc1}.card.shortcut{border-left-color:var(--gold)}.card.shortcut strong{color:#ffd18d}.card.fallback{border-left-color:var(--purple)}.card.fallback strong{color:#d4c2ff}.card.timing{border-left-color:#8da8bb}.card small{color:var(--muted)}.timer{font-variant-numeric:tabular-nums}.controls{position:sticky;bottom:0;display:grid;grid-template-columns:1fr 1fr;gap:9px;margin:16px -18px -18px;padding:13px 18px;border-top:1px solid var(--line);background:rgba(2,8,18,.94);backdrop-filter:blur(18px)}button{min-height:44px;border:1px solid var(--line);border-radius:12px;color:var(--text);background:rgba(255,255,255,.045);font:inherit;font-weight:850;cursor:pointer}button.primary{color:#03111d;border-color:transparent;background:linear-gradient(135deg,var(--cyan),#9abaff)}button:disabled{opacity:.35;cursor:default}.next-preview{margin-top:12px;color:var(--muted);font-size:.72rem}.loading,.error{padding:18px;border:1px solid var(--line);border-radius:16px;background:rgba(255,255,255,.035)}.error{border-color:rgba(255,143,154,.35);color:#ffd9dc}
    @media(max-width:520px){.metrics{grid-template-columns:1fr}.topline{align-items:flex-start;flex-direction:column}.controls{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <main id="root" class="app"><p class="loading">Načítám poznámky…</p></main>
  <script type="module" src="./assets/js/console.js"></script>
</body>
</html>
