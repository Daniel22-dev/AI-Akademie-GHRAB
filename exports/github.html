h main a folder /(root)","text":"Potvrďte tlačítkem Save."},{"title":"Vyčkejte na první nasazení","text":"Stav lze zkontrolovat na stránce Pages nebo v záložce Actions."}]},{"type":"callout","tone":"info","title":"Technická poznámka","text":"Tento školící portál i exportované materiály jsou statické HTML, CSS a JavaScript soubory. GitHub Pages je pro tento typ obsahu přímo určen."}]},{"id":"upload","title":"Nahrání prvního HTML souboru","kicker":"PRAKTICKÝ POSTUP · 12 MIN","duration":12,"summary":"Hotový export nahrajete přes webové rozhraní a změnu uložíte jako commit.","blocks":[{"type":"steps","items":[{"title":"Otevřete správný repozitář","text":"Před nahráním zkontrolujte název a vlastníka."},{"title":"Zvolte Add file → Upload files","text":"Soubor lze přetáhnout do označené oblasti nebo vybrat z disku."},{"title":"Použijte bezpečný název souboru","text":"Například fractions-practice-1.html. Vyhněte se diakritice a mezerám."},{"title":"Napište srozumitelný commit message","text":"Například Přidán test zlomky – základní verze."},{"title":"Potvrďte Commit changes","text":"Po uložení vyčkejte na nové nasazení GitHub Pages."}]},{"type":"callout","tone":"warning","title":"Limity webového nahrávání","text":"GitHub omezuje velikost jednotlivých souborů a počet souborů nahrávaných najednou. Běžný samostatný HTML materiál je však zpravidla výrazně menší."}]},{"id":"link","title":"Odkaz pro žáky","kicker":"SDÍLENÍ · 10 MIN","duration":10,"summary":"Projektový odkaz má stálou strukturu. Pro každý materiál se mění pouze název souboru.","blocks":[{"type":"code","label":"Vzorec projektového odkazu","code":"https://uzivatelske-jmeno.github.io/nazev-repozitare/nazev-souboru.html"},{"type":"code","label":"Příklad","code":"https://novakova-aj.github.io/interaktivni-testy/unit-4-food.html"},{"type":"checklist","title":"Před odesláním odkazu","items":["Otevřu odkaz v novém nebo anonymním okně.","Zkontroluji obsah a správnou verzi.","Ověřím, že soubor neobsahuje osobní údaje ani API klíč.","Vyzkouším materiál alespoň na počítači a telefonu."]},{"type":"quiz","question":"Který odkaz typicky spustí stránku přes GitHub Pages?","options":["https://github.com/uzivatel/repozitar/soubor.html","https://uzivatel.github.io/repozitar/soubor.html","file:///C:/Downloads/soubor.html","https://api.github.com/soubor.html"],"answer":1,"explanation":"Adresa GitHub Pages používá doménu uzivatel.github.io."}]},{"id":"update","title":"Aktualizace bez změny odkazu","kicker":"BĚŽNÁ ÚDRŽBA · 10 MIN","duration":10,"summary":"Když nová verze zachová stejný název a umístění souboru, odkaz pro žáky zůstane stejný.","blocks":[{"type":"steps","items":[{"title":"Exportujte opravenou verzi se stejným názvem","text":"Název musí přesně odpovídat původnímu souboru."},{"title":"Nahrajte ji do stejného místa repozitáře","text":"GitHub změnu rozpozná jako aktualizaci existujícího souboru."},{"title":"Popište opravu v commit message","text":"Například Opraven klíč u otázky 6."},{"title":"Počkejte na dokončení nasazení","text":"Odkaz se nemění. Po nasazení zkontrolujte novou verzi."}]},{"type":"activity","title":"Zkušební aktualizace","brief":"Proveďte drobnou změnu v testovacím souboru a publikujte ji pod stejným názvem.","steps":["Upravte nadpis nebo jednu větu.","Nahrajte soubor znovu.","Sledujte stav nasazení.","Otevřete původní odkaz a ověřte změnu."],"output":"Aktualizovaný materiál dostupný na stejném odkazu."},{"type":"callout","tone":"success","title":"Připraveno pro aplikace","text":"Po zvládnutí tohoto modulu můžete pokračovat Generátorem interaktivních testů nebo LUDUSem."}]}]};

const icons={left:'<svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>',right:'<svg viewBox="0 0 24 24"><path d="M9 18l6-6-6-6"/></svg>',expand:'<svg viewBox="0 0 24 24"><path d="M8 3H3v5M16 3h5v5M8 21H3v-5M21 16v5h-5"/></svg>',list:'<svg viewBox="0 0 24 24"><path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/></svg>',print:'<svg viewBox="0 0 24 24"><path d="M6 9V3h12v6M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2M6 14h12v7H6z"/></svg>'};
let index=0;
const esc=v=>String(v??'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'",'&#039;');
const slideCount=course.lessons.length+1;
function calloutIcon(t){return t==='success'?'✓':t==='warning'?'!':t==='danger'?'×':'i'}
function block(b,bi){switch(b.type){
case'lead':return '<p class="lead">'+esc(b.text)+'</p>';
case'cards':return '<div class="cards c'+(b.columns||3)+'">'+b.items.map(x=>'<article><span>'+esc(x.icon)+'</span><h3>'+esc(x.title)+'</h3><p>'+esc(x.text)+'</p></article>').join('')+'</div>';
case'flow':return '<div class="flow">'+b.items.map((x,i)=>(i?'<i>→</i>':'')+'<article><span>'+esc(x.number)+'</span><h3>'+esc(x.title)+'</h3><p>'+esc(x.text)+'</p></article>').join('')+'</div>';
case'comparison':return '<div class="comparison"><article><h3>'+esc(b.left.title)+'</h3><ul>'+b.left.items.map(x=>'<li>'+esc(x)+'</li>').join('')+'</ul></article><article><h3>'+esc(b.right.title)+'</h3><ul>'+b.right.items.map(x=>'<li>'+esc(x)+'</li>').join('')+'</ul></article></div>';
case'steps':return '<ol class="steps">'+b.items.map((x,i)=>'<li><span>'+String(i+1).padStart(2,'0')+'</span><div><h3>'+esc(x.title)+'</h3><p>'+esc(x.text)+'</p>'+(x.detail?'<small>'+esc(x.detail)+'</small>':'')+'</div></li>').join('')+'</ol>';
case'callout':return '<aside class="callout '+esc(b.tone||'info')+'"><span>'+calloutIcon(b.tone)+'</span><div><h3>'+esc(b.title)+'</h3><p>'+esc(b.text)+'</p></div></aside>';
case'activity':return '<section class="activity"><header><span>PRAXE</span><div><h3>'+esc(b.title)+'</h3><p>'+esc(b.brief)+'</p></div></header><ol>'+b.steps.map(x=>'<li>'+esc(x)+'</li>').join('')+'</ol><footer><strong>Výstup:</strong> '+esc(b.output)+'</footer></section>';
case'checklist':return '<section class="checklist"><h3>'+esc(b.title)+'</h3>'+b.items.map((x,i)=>'<label><input type="checkbox"><span>'+esc(x)+'</span></label>').join('')+'</section>';
case'quiz':return '<section class="quiz" data-answer="'+b.answer+'" data-explanation="'+esc(b.explanation)+'"><h3>'+esc(b.question)+'</h3><div class="options">'+b.options.map((x,i)=>'<button data-option="'+i+'"><span>'+String.fromCharCode(65+i)+'</span>'+esc(x)+'</button>').join('')+'</div></section>';
case'table':return '<div class="table-wrap"><table><thead><tr>'+b.headers.map(x=>'<th>'+esc(x)+'</th>').join('')+'</tr></thead><tbody>'+b.rows.map(r=>'<tr>'+r.map(x=>'<td>'+esc(x)+'</td>').join('')+'</tr>').join('')+'</tbody></table></div>';
case'code':return '<section class="code"><span>'+esc(b.label)+'</span><pre><code>'+esc(b.code)+'</code></pre><button data-copy="'+esc(b.code)+'">Kopírovat</button></section>';
case'quote':return '<blockquote class="quote"><span>“</span><p>'+esc(b.text)+'</p></blockquote>';
default:return''}}
function cover(){return '<section class="slide cover"><div><p class="kicker">'+esc(course.code)+' · '+esc(course.category)+'</p><h1>'+esc(course.title)+'<span>AI Akademie GHRAB</span></h1><p class="subtitle">'+esc(course.subtitle)+'</p><div class="cover-meta"><span class="pill">'+esc(course.audience)+'</span><span class="pill">'+course.duration+' minut</span><span class="pill">'+course.lessons.length+' částí</span><span class="pill">'+esc(course.level)+'</span></div><ul class="cover-outcomes">'+course.outcomes.map(x=>'<li>'+esc(x)+'</li>').join('')+'</ul></div><div class="cover-art"><img src="'+course.icon+'" alt=""></div></section>'}
function lesson(l){return '<section class="slide"><p class="kicker">'+esc(l.kicker)+'</p><h2>'+esc(l.title)+'</h2><p class="summary">'+esc(l.summary)+'</p><div class="content">'+l.blocks.map(block).join('')+'</div></section>'}
function render(){const active=index===0?null:course.lessons[index-1];document.title=(active?active.title:course.title)+' · AI Akademie GHRAB';const pct=Math.round(index/(slideCount-1)*100);document.querySelector('#app').innerHTML='<header class="topbar"><div class="brand"><img src="'+brandIcon+'" alt=""><div><strong>AI Akademie GHRAB</strong><small>Interaktivní materiál pro účastníky</small></div></div><div class="top-title"><small>'+esc(course.code)+'</small><strong>'+(active?esc(active.title):esc(course.title))+'</strong></div><div class="top-actions"><button class="icon-btn" data-action="print" title="Tisk / PDF">'+icons.print+'</button><button class="icon-btn" data-action="fullscreen" title="Celá obrazovka">'+icons.expand+'</button></div></header><main class="workspace"><aside class="sidebar"><p class="sidebar-label">OBSAH PREZENTACE</p><nav class="nav"><button data-slide="0" class="'+(index===0?'active':'')+'"><b>00</b><span><strong>Úvodní obrazovka</strong><small>'+course.duration+' min celkem</small></span></button>'+course.lessons.map((l,i)=>'<button data-slide="'+(i+1)+'" class="'+(index===i+1?'active':'')+'"><b>'+String(i+1).padStart(2,'0')+'</b><span><strong>'+esc(l.title)+'</strong><small>'+l.duration+' min</small></span></button>').join('')+'</nav></aside><article class="stage">'+(index===0?cover():lesson(active))+'</article></main><footer class="bottom"><button data-action="prev" '+(index===0?'disabled':'')+'>'+icons.left+' Předchozí</button><div class="progress"><span>'+(index+1)+' / '+slideCount+'</span><div class="progress-bar"><i style="width:'+pct+'%"></i></div></div><button class="next" data-action="next" '+(index===slideCount-1?'disabled':'')+'>Další '+icons.right+'</button></footer>';bind()}
function bind(){document.querySelectorAll('[data-slide]').forEach(b=>b.onclick=()=>{index=Number(b.dataset.slide);render()});document.querySelector('[data-action="prev"]')?.addEventListener('click',()=>{if(index>0){index--;render()}});document.querySelector('[data-action="next"]')?.addEventListener('click',()=>{if(index<slideCount-1){index++;render()}});document.querySelector('[data-action="fullscreen"]')?.addEventListener('click',async()=>{if(!document.fullscreenElement)await document.documentElement.requestFullscreen();else await document.exitFullscreen()});document.querySelector('[data-action="print"]')?.addEventListener('click',()=>window.print());document.querySelectorAll('.checklist label').forEach(l=>l.addEventListener('change',()=>l.classList.toggle('checked',l.querySelector('input').checked)));document.querySelectorAll('.quiz').forEach(q=>q.querySelectorAll('[data-option]').forEach(btn=>btn.onclick=()=>{if(q.dataset.done)return;q.dataset.done='1';const selected=Number(btn.dataset.option),answer=Number(q.dataset.answer);q.querySelectorAll('[data-option]').forEach(x=>{x.disabled=true;if(Number(x.dataset.option)===answer)x.classList.add('correct')});if(selected!==answer)btn.classList.add('incorrect');q.insertAdjacentHTML('beforeend','<div class="feedback"><strong>'+(selected===answer?'Správně.':'Ještě ne.')+'</strong> '+q.dataset.explanation+'</div>')}));document.querySelectorAll('[data-copy]').forEach(b=>b.onclick=async()=>{try{await navigator.clipboard.writeText(b.dataset.copy);b.textContent='Zkopírováno'}catch{}})}
addEventListener('keydown',e=>{if(e.target.matches('input,button'))return;if(e.key==='ArrowRight'||e.key==='PageDown'){if(index<slideCount-1){index++;render()}}if(e.key==='ArrowLeft'||e.key==='PageUp'){if(index>0){index--;render()}}if(e.key.toLowerCase()==='f')document.querySelector('[data-action="fullscreen"]')?.click();if(e.key==='Home'){index=0;render()}if(e.key==='End'){index=slideCount-1;render()}});render();
</script>
