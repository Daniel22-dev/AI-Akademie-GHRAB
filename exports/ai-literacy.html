ává autorem rozhodnutí, AI může být spolupracovníkem."},{"type":"cards","columns":4,"items":[{"icon":"1","title":"Příprava","text":"Nápady, struktury hodin, varianty aktivit, pracovní listy a otázky."},{"icon":"2","title":"Komunikace","text":"Návrhy e-mailů, shrnutí, úprava tónu a převod složitého textu do srozumitelné podoby."},{"icon":"3","title":"Analýza","text":"Porovnání verzí, hledání slabých míst, třídění podkladů a návrhy zlepšení."},{"icon":"4","title":"Učení","text":"Individualizace, zpětná vazba, trénink vysvětlování a tvorba různých cest k cíli."}]},{"type":"callout","tone":"warning","title":"Dvě stejně nebezpečné krajnosti","text":"„AI všechno vyřeší“ i „AI do školy nepatří“ obcházejí skutečný úkol: naučit se technologii používat účelně, bezpečně a kriticky."}]},{"id":"what-it-is","title":"Co generativní AI je — a co není","kicker":"MENTÁLNÍ MODEL · 9 MIN","duration":9,"summary":"Model nevlastní pravdu ani lidské porozumění. Vytváří pravděpodobnou odpověď podle zadání, kontextu a naučených vzorců.","blocks":[{"type":"comparison","left":{"title":"Co AI umí dobře","items":["rychle navrhnout více variant","pracovat se strukturou a stylem","přeformulovat, shrnout a kategorizovat","kombinovat informace z dodaného kontextu","pomáhat při hledání možností"]},"right":{"title":"Co z odpovědi neplyne","items":["že jsou fakta správná","že citovaný zdroj skutečně existuje","že výstup odpovídá vašemu záměru","že je materiál didakticky vhodný","že lze výsledek použít bez kontroly"]}},{"type":"quote","text":"Plynulost není totéž co pravdivost. Sebejistý tón není totéž co důkaz."},{"type":"quiz","question":"Které tvrzení vystihuje nejbezpečnější přístup?","options":["Když odpověď zní odborně, lze jí věřit.","AI je vhodná hlavně pro fakta, protože se nemýlí.","AI navrhuje výstup; člověk ověřuje a rozhoduje.","AI je jen vyhledávač s hezčím rozhraním."],"answer":2,"explanation":"Generativní model je nástroj pro návrh a zpracování, nikoli automatická autorita."}]},{"id":"good-task","title":"Jak zadávat práci, aby výstup dával smysl","kicker":"PRAKTICKÝ RÁMEC · 10 MIN","duration":10,"summary":"Kvalitní výsledek nevzniká kouzelnou formulí. Vzniká z jasného cíle, dostatečného kontextu, požadovaného formátu a kritérií kontroly.","blocks":[{"type":"flow","items":[{"number":"CÍL","title":"Co potřebuji","text":"Jedna jasná věta: co má výstup umožnit učiteli nebo žákovi."},{"number":"KONTEXT","title":"Pro koho a z čeho","text":"Předmět, ročník, úroveň, čas, zdrojový materiál a situace."},{"number":"VÝSTUP","title":"Jak má vypadat","text":"Struktura, rozsah, jazyk, počet variant nebo konkrétní formát."},{"number":"KRITÉRIA","title":"Co musí splnit","text":"Správnost, věková přiměřenost, návaznost na cíl, co se nesmí změnit."}]},{"type":"code","label":"Použitelná šablona zadání","code":"Cíl: ...\nKontext: předmět, ročník, úroveň, délka hodiny...\nPodklad: ...\nVytvoř: ...\nZachovej: ...\nVyvaruj se: ...\nNa konci proveď kontrolu podle těchto kritérií: ..."},{"type":"activity","title":"Z vágního zadání na profesionální","brief":"Přepracujte zadání „Vytvoř mi aktivitu o klimatu“ tak, aby kolega podle výsledku mohl skutečně učit.","steps":["Určete jeden konkrétní výukový cíl.","Doplňte věkovou skupinu a předmět.","Stanovte čas a podobu výstupu.","Napište dvě věci, které se nesmí stát.","Přidejte způsob ověření výsledku."],"output":"Jedno zadání, které lze rovnou vložit do AI nástroje."}]},{"id":"material-workflow","title":"Jak zpracovávat materiály s AI","kicker":"WORKFLOW UČITELE · 12 MIN","duration":12,"summary":"Nejbezpečnější postup nezačíná generováním od nuly. Začíná kvalitním podkladem, jasným cílem a několika kontrolními průchody.","blocks":[{"type":"steps","items":[{"title":"Vyberte důvěryhodný podklad","text":"Vlastní text, učebnici, oficiální zdroj, rubriku nebo ověřená data. AI nemusí informace domýšlet."},{"title":"Očistěte data","text":"Odstraňte jména, kontakty, citlivé údaje a vše, co není pro úkol nezbytné."},{"title":"Nechte AI nejprve porozumět zadání","text":"Požádejte o stručné shrnutí cíle, omezení a možných rizik. Opravte nedorozumění dřív, než vznikne celý materiál."},{"title":"Vytvořte první návrh","text":"Požadujte konkrétní formát a přiměřený rozsah. Nenechávejte model rozhodovat o všem."},{"title":"Proveďte odbornou a didaktickou kontrolu","text":"Fakta, jazyk, obtížnost, instrukce, řešení, spravedlnost a vazba na cíl."},{"title":"Nechte upravit jen konkrétní slabiny","text":"Místo „udělej to lépe“ pojmenujte přesně, co je špatně a co má zůstat."},{"title":"Uložte finální verzi jako vlastní práci","text":"Odstraňte balast, sjednoťte styl a ověřte použitelnost v reálné hodině."}]},{"type":"callout","tone":"success","title":"AI je nejsilnější v iteraci","text":"Kvalita obvykle vzniká v cyklu: návrh → kontrola → cílená oprava → závěrečné ověření. Ne v jednom kliknutí."},{"type":"comparison","left":{"title":"Slabý postup","items":["generovat bez podkladu","přijmout první výsledek","upravit jen vzhled","ověřit až ve třídě"]},"right":{"title":"Profesionální postup","items":["pracovat s důvěryhodným zdrojem","stanovit neměnná kritéria","ověřit obsah i didaktiku","udělat malý test před použitím"]}}]},{"id":"verification","title":"Kritické myšlení a ověřování výstupů","kicker":"KONTROLA KVALITY · 10 MIN","duration":10,"summary":"Ověřování není závěrečná formalita. Je to nedílná součást práce s AI a zároveň model toho, co potřebujeme učit žáky.","blocks":[{"type":"cards","columns":4,"items":[{"icon":"F","title":"Fakta","text":"Lze tvrzení potvrdit v nezávislém důvěryhodném zdroji?"},{"icon":"Z","title":"Zdroje","text":"Existují citace, autoři, dokumenty a odkazy skutečně?"},{"icon":"L","title":"Logika","text":"Navazuje závěr na důkazy, nebo pouze zní přesvědčivě?"},{"icon":"D","title":"Didaktika","text":"Pomůže úkol cíli výuky, nebo jen vypadá atraktivně?"}]},{"type":"checklist","title":"Před použitím materiálu zkontroluji","items":["Ověřil jsem klíčová fakta mimo AI odpověď.","Zkontroloval jsem každou citaci a odkaz.","Prošel jsem zadání i řešení otázku po otázce.","Obtížnost odpovídá cílové skupině.","Instrukce jsou jednoznačné a nevedou ke sporu.","Materiál neobsahuje stereotypy, nevhodné generalizace ani citlivá data.","Vím, co udělám, když žák najde chybu."]},{"type":"callout","tone":"warning","title":"Požádat AI o kontrolu nestačí","text":"Model může zopakovat vlastní chybu nebo vytvořit přesvědčivé vysvětlení nesprávného tvrzení. Nezávislý zdroj a odborný úsudek nelze obejít."}]},{"id":"students","title":"AI, žáci a proměna zadávání úkolů","kicker":"VÝUKA A HODNOCENÍ · 10 MIN","duration":10,"summary":"Smyslem není soutěžit s žáky v odhalování AI. Potřebujeme navrhovat úkoly, ve kterých je vidět proces, porozumění, rozhodování a osobní odpovědnost.","blocks":[{"type":"comparison","left":{"title":"Úkol snadno nahraditelný AI","items":["obecný referát bez práce se zdroji","shrnutí známého tématu","stejný esejový úkol pro všechny","výsledek bez zachycení procesu"]},"right":{"title":"Úkol podporující skutečné učení","items":["práce s konkrétním školním podkladem","obhajoba voleb a změn","srovnání zdrojů a ověřování","průběžné verze a reflexe postupu","ústní navázání nebo praktická aplikace"]}},{"type":"steps","items":[{"title":"Stanovte pravidla použití","text":"Co je dovoleno, co se má přiznat a co už je nahrazení vlastní práce."},{"title":"Hodnoťte proces","text":"Návrh, zdroje, revize, rozhodnutí a reflexe jsou často cennější než hladký finální text."},{"title":"Vyžadujte dohledatelnost","text":"Žák vysvětlí, jak AI použil, co odmítl, co ověřil a co upravil."},{"title":"Učte práci s chybou","text":"AI výstup může být předmětem kritiky, opravování a argumentace."}]},{"type":"callout","tone":"danger","title":"Detektor AI není důkaz","text":"Automatické detektory mohou chybovat a nesmí být jediným podkladem pro obvinění žáka. Důležitější je dobře navržený proces práce a ověřitelné podklady."}]},{"id":"responsibility","title":"Bezpečnost, autorská odpovědnost a transparentnost","kicker":"PRAVIDLA PRAXE · 8 MIN","duration":8,"summary":"Učitel musí vědět, jaká data používá, odkud pochází podklad, kdo odpovídá za finální výstup a kdy je vhodné použití AI přiznat.","blocks":[{"type":"cards","columns":3,"items":[{"icon":"D","title":"Data","text":"Používám jen nezbytná a anonymizovaná data. Citlivé údaje do nástroje nevkládám."},{"icon":"A","title":"Autorství","text":"AI může pomoci, ale výběr, úpravy a odpovědnost za materiál nesu já."},{"icon":"T","title":"Transparentnost","text":"Tam, kde je to významné, dokážu popsat, jakou roli AI v přípravě nebo úkolu hrála."}]},{"type":"table","headers":["Situace","Rozumný postup"],"rows":[["Příprava běžného pracovního listu","AI lze použít jako pomocníka; učitel ověří obsah, řešení a přiměřenost."],["Hodnocení konkrétního žáka","Anonymizovat, držet se rubriky, výsledek přezkoumat a rozhodnutí nepřenést na AI."],["Citace nebo odborné tvrzení","Dohledat primární či důvěryhodný zdroj a ověřit přesné znění."],["Materiál převzatý z publikace","Respektovat licenci a autorská práva; AI není způsob, jak je obejít."],["AI výstup sdílený s kolegy","Popsat účel, míru kontroly a případná omezení materiálu."]]},{"type":"quote","text":"Odpovědné používání AI není jen otázka nástroje. Je to otázka profesního úsudku."}]},{"id":"takeaway","title":"Pět pravidel pro každodenní práci","kicker":"ZÁVĚR · 8 MIN","duration":8,"summary":"Kolegové odcházejí s jednoduchým pracovním rámcem, který lze použít u libovolného AI nástroje nebo školní aplikace.","blocks":[{"type":"flow","items":[{"number":"1","title":"Mám cíl","text":"Vím, proč AI používám a co má výsledkem vzniknout."},{"number":"2","title":"Dávám kontext","text":"Dodám kvalitní podklad, publikum, omezení a kritéria."},{"number":"3","title":"Chráním data","text":"Nevkládám zbytečné osobní ani citlivé údaje."},{"number":"4","title":"Ověřuji","text":"Kontroluji fakta, zdroje, logiku, didaktiku i spravedlnost."},{"number":"5","title":"Rozhoduji já","text":"Konečný výstup je moje profesní odpovědnost."}]},{"type":"activity","title":"Osobní mini-plán","brief":"Vyberte jednu opakující se činnost, u které může AI ušetřit čas, aniž by převzala vaše rozhodování.","steps":["Pojmenujte konkrétní úkol.","Určete, kterou část může dělat AI.","Určete, co musí zůstat na člověku.","Napište způsob kontroly výsledku.","Stanovte, jak ochráníte data."],"output":"Jedna bezpečná a realistická situace k vyzkoušení během příštího týdne."},{"type":"callout","tone":"success","title":"Varianty podle zkušenosti skupiny","text":"Pro méně zkušené: více živých ukázek a jeden společný úkol. Pro pokročilé: srovnání modelů, práce s delším podkladem, redesign hodnocení a společná tvorba pravidel předmětové komise."}]}]};

const icons={left:'<svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>',right:'<svg viewBox="0 0 24 24"><path d="M9 18l6-6-6-6"/></svg>',expand:'<svg viewBox="0 0 24 24"><path d="M8 3H3v5M16 3h5v5M8 21H3v-5M21 16v5h-5"/></svg>',list:'<svg viewBox="0 0 24 24"><path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/></svg>',print:'<svg viewBox="0 0 24 24"><path d="M6 9V3h12v6M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2M6 14h12v7H6z"/></svg>'};
let index=0;
const esc=v=>String(v??'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'",'&#039;');
const slideCount=course.lessons.length+1;
function calloutIcon(t){return t==='success'?'✓':t==='warning'?'!':t==='danger'?'×':'i'}
function block(b,bi){switch(b.type){
case'lead':return '<p class="lead">'+esc(b.text)+'</p>';
case'cards':return '<div class="cards c'+(b.columns||3)+'">'+b.items.map(x=>'<article><span>'+esc(x.icon)+'</span><h3>'+esc(x.title)+'</h3><p>'+esc(x.text)+'</p></article>').join('')+'</div>';
case'flow':return '<div class="flow">'+b.items.map((x,i)=>(i?'<i>→</i>':'')+'<article><span>'+esc(x.number)+'</span><h3>'+esc(x.title)+'</h3><p>'+esc(x.text)+'</p></article>').join('')+'</div>';
case'comparison':return '<div class="comparison"><article><h3>'+esc(b.left.title)+'</h3><ul>'+b.left.items.map(x=>'<li>'+esc(x)+'</li>').join('')+'</ul></article><article><h3>'+esc(b.right.title)+'</h3><ul>'+b.right.items.map(x=>'<li>'+esc(x)+'</li>').join('')+'</ul></article></div>';
case'steps':return '<ol class="steps">'+b.items.map((x,i)=>'<li><span>'+String(i+1).padStart(2,'0')+'</span><div><h3>'+esc(x.title)+'</h3><p>'+esc(x.text)+'</p>'+(x.detail?'<small>'+esc(x.detail)+'</small>':'')+'</div></li>').join('')+'</ol>';
case'callout':return '<aside class="callout '+esc(b.tone||'info')+'"><span>'+calloutIcon(b.tone)+'</span><div><h3>'+esc(b.title)+'</h3><p>'+esc(b.text)+'</p></div></aside>';
case'activity':return '<section class="activity"><header><span>PRAXE</span><div><h3>'+esc(b.title)+'</h3><p>'+esc(b.brief)+'</p></div></header><ol>'+b.steps.map(x=>'<li>'+esc(x)+'</li>').join('')+'</ol><footer><strong>Výstup:</strong> '+esc(b.output)+'</footer></section>';
case'checklist':return '<section class="checklist"><h3>'+esc(b.title)+'</h3>'+b.items.map((x,i)=>'<label><input type="checkbox"><span>'+esc(x)+'</span></label>').join('')+'</section>';
case'quiz':return '<section class="quiz" data-answer="'+b.answer+'" data-explanation="'+esc(b.explanation)+'"><h3>'+esc(b.question)+'</h3><div class="options">'+b.options.map((x,i)=>'<button data-option="'+i+'"><span>'+String.fromCharCode(65+i)+'</span>'+esc(x)+'</button>').join('')+'</div></section>';
case'table':return '<div class="table-wrap"><table><thead><tr>'+b.headers.map(x=>'<th>'+esc(x)+'</th>').join('')+'</tr></thead><tbody>'+b.rows.map(r=>'<tr>'+r.map(x=>'<td>'+esc(x)+'</td>').join('')+'</tr>').join('')+'</tbody></table></div>';
case'code':return '<section class="code"><span>'+esc(b.label)+'</span><pre><code>'+esc(b.code)+'</code></pre><button data-copy="'+esc(b.code)+'">Kopírovat</button></section>';
case'quote':return '<blockquote class="quote"><span>“</span><p>'+esc(b.text)+'</p></blockquote>';
default:return''}}
function cover(){return '<section class="slide cover"><div><p class="kicker">'+esc(course.code)+' · '+esc(course.category)+'</p><h1>'+esc(course.title)+'<span>AI Akademie GHRAB</span></h1><p class="subtitle">'+esc(course.subtitle)+'</p><div class="cover-meta"><span class="pill">'+esc(course.audience)+'</span><span class="pill">'+course.duration+' minut</span><span class="pill">'+course.lessons.length+' částí</span><span class="pill">'+esc(course.level)+'</span></div><ul class="cover-outcomes">'+course.outcomes.map(x=>'<li>'+esc(x)+'</li>').join('')+'</ul></div><div class="cover-art"><img src="'+course.icon+'" alt=""></div></section>'}
function lesson(l){return '<section class="slide"><p class="kicker">'+esc(l.kicker)+'</p><h2>'+esc(l.title)+'</h2><p class="summary">'+esc(l.summary)+'</p><div class="content">'+l.blocks.map(block).join('')+'</div></section>'}
function render(){const active=index===0?null:course.lessons[index-1];document.title=(active?active.title:course.title)+' · AI Akademie GHRAB';const pct=Math.round(index/(slideCount-1)*100);document.querySelector('#app').innerHTML='<header class="topbar"><div class="brand"><img src="'+brandIcon+'" alt=""><div><strong>AI Akademie GHRAB</strong><small>Interaktivní materiál pro účastníky</small></div></div><div class="top-title"><small>'+esc(course.code)+'</small><strong>'+(active?esc(active.title):esc(course.title))+'</strong></div><div class="top-actions"><button class="icon-btn" data-action="print" title="Tisk / PDF">'+icons.print+'</button><button class="icon-btn" data-action="fullscreen" title="Celá obrazovka">'+icons.expand+'</button></div></header><main class="workspace"><aside class="sidebar"><p class="sidebar-label">OBSAH PREZENTACE</p><nav class="nav"><button data-slide="0" class="'+(index===0?'active':'')+'"><b>00</b><span><strong>Úvodní obrazovka</strong><small>'+course.duration+' min celkem</small></span></button>'+course.lessons.map((l,i)=>'<button data-slide="'+(i+1)+'" class="'+(index===i+1?'active':'')+'"><b>'+String(i+1).padStart(2,'0')+'</b><span><strong>'+esc(l.title)+'</strong><small>'+l.duration+' min</small></span></button>').join('')+'</nav></aside><article class="stage">'+(index===0?cover():lesson(active))+'</article></main><footer class="bottom"><button data-action="prev" '+(index===0?'disabled':'')+'>'+icons.left+' Předchozí</button><div class="progress"><span>'+(index+1)+' / '+slideCount+'</span><div class="progress-bar"><i style="width:'+pct+'%"></i></div></div><button class="next" data-action="next" '+(index===slideCount-1?'disabled':'')+'>Další '+icons.right+'</button></footer>';bind()}
function bind(){document.querySelectorAll('[data-slide]').forEach(b=>b.onclick=()=>{index=Number(b.dataset.slide);render()});document.querySelector('[data-action="prev"]')?.addEventListener('click',()=>{if(index>0){index--;render()}});document.querySelector('[data-action="next"]')?.addEventListener('click',()=>{if(index<slideCount-1){index++;render()}});document.querySelector('[data-action="fullscreen"]')?.addEventListener('click',async()=>{if(!document.fullscreenElement)await document.documentElement.requestFullscreen();else await document.exitFullscreen()});document.querySelector('[data-action="print"]')?.addEventListener('click',()=>window.print());document.querySelectorAll('.checklist label').forEach(l=>l.addEventListener('change',()=>l.classList.toggle('checked',l.querySelector('input').checked)));document.querySelectorAll('.quiz').forEach(q=>q.querySelectorAll('[data-option]').forEach(btn=>btn.onclick=()=>{if(q.dataset.done)return;q.dataset.done='1';const selected=Number(btn.dataset.option),answer=Number(q.dataset.answer);q.querySelectorAll('[data-option]').forEach(x=>{x.disabled=true;if(Number(x.dataset.option)===answer)x.classList.add('correct')});if(selected!==answer)btn.classList.add('incorrect');q.insertAdjacentHTML('beforeend','<div class="feedback"><strong>'+(selected===answer?'Správně.':'Ještě ne.')+'</strong> '+q.dataset.explanation+'</div>')}));document.querySelectorAll('[data-copy]').forEach(b=>b.onclick=async()=>{try{await navigator.clipboard.writeText(b.dataset.copy);b.textContent='Zkopírováno'}catch{}})}
addEventListener('keydown',e=>{if(e.target.matches('input,button'))return;if(e.key==='ArrowRight'||e.key==='PageDown'){if(index<slideCount-1){index++;render()}}if(e.key==='ArrowLeft'||e.key==='PageUp'){if(index>0){index--;render()}}if(e.key.toLowerCase()==='f')document.querySelector('[data-action="fullscreen"]')?.click();if(e.key==='Home'){index=0;render()}if(e.key==='End'){index=slideCount-1;render()}});render();
</script>
</body>
</html>
